<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeTrack</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page">
        <div class="sidebar">
            <div class="logo">
                <div class="clock">L</div>
                <h1>TimeTrack</h1>
            </div>

            <div class="menu">
                <a class="menu-link active" href="#">
                    <span class="menu-icon">H</span>
                    <span>Dashboard</span>
                </a>

                <a class="menu-link" href="#">
                    <span class="menu-icon">T</span>
                    <span>Tasks</span>
                </a>

                <a class="menu-link" href="#">
                    <span class="menu-icon">C</span>
                    <span>Calendar</span>
                </a>

                <a class="menu-link" href="#">
                    <span class="menu-icon">F</span>
                    <span>Focus Timer</span>
                </a>

                <a class="menu-link" href="#">
                    <span class="menu-icon">S</span>
                    <span>Settings</span>
                </a>
            </div>
        </div>

        <div class="main-content">
            <div class="top-header">
                <div class="welcome">
                    <h2>Good morning, Alex! <span class="wave">&#128075;</span></h2>
                    <p>Let's make today productive.</p>
                </div>

                <div class="profile">
                    <span class="date-icon">D</span>
                    <span class="date">May 15, 2024</span>
                    <span class="avatar">A</span>
                </div>
            </div>

            <div class="summary-section">
                <div class="summary-card task-summary">
                    <div class="summary-icon">T</div>

                    <div class="summary-text">
                        <p class="summary-title">Tasks Today</p>
                        <p class="summary-number">5</p>
                        <p class="summary-note">2 completed</p>
                    </div>
                </div>

                <div class="summary-card focus-summary">
                    <div class="summary-icon focus-icon">F</div>

                    <div class="summary-text">
                        <p class="summary-title">Focus Time</p>
                        <p class="summary-number">2h 30m</p>
                        <p class="summary-note focus-note">+ 20m from yesterday</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
